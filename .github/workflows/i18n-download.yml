name: i18n Download
on:
  workflow_dispatch:
jobs:
  i18n-download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y gettext
          npm install -g @crowdin/cli
      - name: Download translations from Crowdin
        env:
          CROWDIN_API_KEY: ${{ secrets.CROWDIN_API_KEY }}
        run: make i18n-download
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PR_TOKEN || github.token }}
          branch: i18n/automated-download
          commit-message: "chore: update translations from Crowdin"
          title: "chore: update translations (automated i18n download)"
          body: |
            Automated translation download from Crowdin project 201933.

            Generated by the [i18n-download workflow](.github/workflows/i18n-download.yml).
          labels: "TAG: user strings"
          delete-branch: true
